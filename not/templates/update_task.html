<!DOCTYPE html>
<html>
<head>
    <title>Update Task</title>
</head>
<body>

    <h1>Update Task</h1>

    <form method="POST" action="/update-task">

        {% csrf_token %}

        <input type="text" name="name" placeholder="Enter Name">

        <br><br>

        <input type="text" name="phone_num" placeholder="Enter Phone Number">

        <br><br>

        <input type="text" name="title" placeholder="Enter New Title">

        <br><br>

        <textarea name="description" placeholder="Enter New Description"></textarea>

        <br><br>

        <button type="submit">
            Update Task
        </button>

    </form>
    <h3>
    {{ message }}
</h3>

</body>
</html>
